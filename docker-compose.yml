version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ips-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ips_db}
    ports:
      - "5432:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ips-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - DB_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-ips_db}
      - WHATSAPP_SESSION_PATH=./.wwebjs_auth
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - /app/node_modules
      # Access catalog file from client assets
      - ./client/assets/catalogos.json:/app/catalogos.json:ro
      # Use named volume for WhatsApp session for better performance
      - whatsapp_session:/app/.wwebjs_auth
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ips-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - VITE_API_URL=http://backend:3001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  whatsapp_session:
